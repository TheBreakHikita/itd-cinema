<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sync Cinema - Совместный просмотр</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Окно регистрации (ввод ника) -->
    <div id="login-overlay">
        <div class="login-box">
            <h2>Добро пожаловать в кино!</h2>
            <input type="text" id="nickname-input" placeholder="Введите ваш ник..." required>
            <button id="join-btn">Войти в зал</button>
        </div>
    </div>

    <!-- Основной интерфейс -->
    <header>
        <h1>
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#0a84ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
            Sync Cinema
        </h1>
        <a href="schedule.html" class="nav-btn">Афиша сеансов</a>
    </header>

    <main id="cinema-room" style="display: none;">
        <div class="video-container">
            <!-- Плеер зрителя (без атрибута controls) -->
            <video id="video-player" style="pointer-events: none;">
                Ваш браузер не поддерживает видео.
            </video>
        </div>
        
        <div class="chat-container">
            <div id="chat-messages"></div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Сообщение...">
                <button id="send-btn" title="Отправить">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m2 9 3-3 3 3"></path><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 18H7a2 2 0 0 1-2-2V6M22 15l-3 3-3-3"></path><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 6h6a2 2 0 0 1 2 2v10"></path></svg>
                </button>
            </div>
        </div>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
