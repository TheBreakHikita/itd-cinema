<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Афиша - Sync Cinema</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#0a84ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
            Афиша сеансов
        </h1>
        <a href="index.html" class="nav-btn">Вернуться в зал</a>
    </header>

    <div class="schedule-container" id="schedule-list">
        <!-- Карточки будут загружаться динамически через JS -->
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const scheduleList = document.getElementById('schedule-list');

        socket.on('update-schedule', (schedule) => {
            scheduleList.innerHTML = '';
            schedule.forEach(movie => {
                const card = document.createElement('div');
                card.classList.add('movie-card');
                card.innerHTML = `
                    <h3>🎬 ${movie.title}</h3>
                    <p><strong>Время:</strong> ${movie.time}</p>
                    <p><strong>Жанр:</strong> ${movie.genre}</p>
                `;
                scheduleList.appendChild(card);
            });
        });
    </script>
</body>
</html>
